      <h1 style="color:#fff">HIMTI</h1>
      <p class="sub">Sistem Administrasi Internal</p>
    </div>
    <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.3),transparent)"></div>
    <div class="lbody">
      <div class="role-badge" style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)">
        <span>👑</span>
        <div>
          <div style="font-size:.68rem;color:#c4b5fd;text-transform:uppercase;letter-spacing:.1em">Akses Terbatas</div>
          <div style="font-weight:700">Super Administrator</div>
        </div>
      </div>
      <div id="alSA"></div>
      <div class="fg"><label class="fl">Username</label>
        <input type="text" id="uname" class="fc" placeholder="Username administrator" autocomplete="off">
      </div>
      <div class="fg"><label class="fl">Password</label>
        <div style="position:relative">
          <input type="password" id="pass" class="fc" placeholder="Password" style="padding-right:44px" autocomplete="off">
          <button onclick="tp()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3);font-size:.95rem">👁</button>
        </div>
      </div>
      <button class="btn btn-full btn-lg" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff" id="loginBtn" onclick="doLogin()">
        👑 Masuk
      </button>
    </div>
  </div>
</div>
<script>
const pc = document.getElementById('ptcl');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div'); const s = Math.random()*2.5+1;
  p.className = 'particle';
  p.style.cssText = 'width:'+s+'px;height:'+s+'px;left:'+Math.random()*100+'%;bottom:-10px;background:rgba(139,92,246,'+(Math.random()*.2+.07)+');animation-duration:'+(Math.random()*10+8)+'s;animation-delay:'+(Math.random()*8)+'s;';
  pc.appendChild(p);
}
if (localStorage.getItem('himti_sa_token')) window.location.href = '/himti-sa-panel';
function tp() { const i = document.getElementById('pass'); i.type = i.type === 'password' ? 'text' : 'password'; }
document.getElementById('pass').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
async function doLogin() {
  const u = document.getElementById('uname').value.trim(), p = document.getElementById('pass').value;
  const btn = document.getElementById('loginBtn'), ab = document.getElementById('alSA');
  if (!u || !p) { ab.innerHTML = '<div class="alert al-err">⚠️ Wajib diisi</div>'; return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Memverifikasi...'; ab.innerHTML = '';
  try {
    const r = await fetch('/api/superadmin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    const d = await r.json();
    if (d.success) {
      localStorage.setItem('himti_sa_token', d.token);
      localStorage.setItem('himti_sa_user', JSON.stringify(d.user));
      ab.innerHTML = '<div class="alert al-ok">✅ Terautentikasi</div>';
      setTimeout(() => window.location.href = '/himti-sa-panel', 600);
    } else { ab.innerHTML = '<div class="alert al-err">❌ ' + d.message + '</div>'; btn.disabled = false; btn.innerHTML = '👑 Masuk'; }
  } catch(e) { ab.innerHTML = '<div class="alert al-err">❌ Tidak dapat terhubung</div>'; btn.disabled = false; btn.innerHTML = '👑 Masuk'; }
}
</script>
