<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Saya - HIMTI UMB</title>
<script src="/js/auth.js"></script>
<link rel="stylesheet" href="/anggota/anggota.css">
</head>
<body>
<div class="topbar">
  <a href="/anggota/dashboard.html" class="brand">
    <div class="brand-logo">H</div><span class="brand-name">HIMTI UMB</span>
  </a>
  <div class="topbar-right">
    <span class="topbar-user">Halo, <strong id="nav-nama">-</strong></span>
    <button class="btn-logout" onclick="himtiLogout()">Keluar</button>
  </div>
</div>
<div class="backbar">
  <a href="/anggota/dashboard.html" class="back-btn">← Kembali</a>
  <span class="backbar-title">Profil Saya</span>
</div>
<div class="page">
  <div class="spinner-wrap" id="loading"><div class="spinner"></div></div>
  <div id="content" style="display:none">
    <div class="card">
      <div class="card-title">👤 Info Akun</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #e2e8f0">
        <div id="foto-el" style="width:64px;height:64px;border-radius:50%;background:#e2e8f0;border:3px solid #c9a227;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;overflow:hidden">👤</div>
        <div>
          <div style="font-weight:700;font-size:1rem" id="h-nama">-</div>
          <div style="color:#c9a227;font-size:.78rem;font-family:monospace" id="h-npm">-</div>
          <span class="badge badge-aktif" id="h-status" style="margin-top:6px">-</span>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Nama Lengkap</label><input type="text" id="nama" readonly></div>
      <div class="form-group"><label class="form-label">NPM</label><input type="text" id="npm" readonly></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label class="form-label">Program Studi</label><input type="text" id="prodi" readonly></div>
        <div class="form-group"><label class="form-label">Angkatan</label><input type="text" id="angkatan" readonly></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">✏️ Edit Info Kontak</div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="email" placeholder="email aktif kamu"></div>
      <div class="form-group"><label class="form-label">No. HP / WhatsApp</label><input type="text" id="no_hp" placeholder="08xxxxxxxxxx"></div>
      <div class="form-group"><label class="form-label">Ganti Foto (opsional)</label><input type="file" id="foto" accept="image/*" onchange="himtiValidateFile(this)"></div>
      <div class="alert alert-success" id="ok"></div>
      <div class="alert alert-danger" id="err"></div>
      <button class="btn btn-primary btn-full" id="btn-save" onclick="save()">💾 Simpan Perubahan</button>
    </div>
    <div class="card">
      <div class="card-title">📋 Info Keanggotaan</div>
      <div class="info-row"><span class="info-label">Tahun Bergabung</span><span class="info-value" id="t-bergabung">-</span></div>
      <div class="info-row"><span class="info-label">Masa Aktif Mulai</span><span class="info-value" id="t-mulai">-</span></div>
      <div class="info-row"><span class="info-label">Masa Aktif Sampai</span><span class="info-value" id="t-sampai">-</span></div>
    </div>
  </div>
</div>
<script>
const token = sessionStorage.getItem('himti_token');
if (!token || sessionStorage.getItem('himti_role') !== 'anggota') window.location.href='/anggota/login.html';
document.getElementById('nav-nama').textContent = sessionStorage.getItem('himti_nama')||'-';
function fmtDate(d){return d?new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}):'-';}
async function load(){
  const res=await fetch('/api/anggota/profil',{headers:{Authorization:'Bearer '+token}});
  const d=await res.json();
  if(!res.ok)return;
  document.getElementById('nama').value=d.nama;
  document.getElementById('npm').value=d.npm;
  document.getElementById('prodi').value=d.prodi||'-';
  document.getElementById('angkatan').value=d.angkatan||'-';
  document.getElementById('email').value=d.email||'';
  document.getElementById('no_hp').value=d.no_hp||'';
  document.getElementById('h-nama').textContent=d.nama;
  document.getElementById('h-npm').textContent='NPM: '+d.npm;
  document.getElementById('t-bergabung').textContent=d.tahun_bergabung||'-';
  document.getElementById('t-mulai').textContent=fmtDate(d.masa_aktif_mulai);
  document.getElementById('t-sampai').textContent=fmtDate(d.masa_aktif_sampai);
  const sb=document.getElementById('h-status');
  const m={aktif:['badge-aktif','✅ Aktif'],pending:['badge-pending','⏳ Pending'],kadaluarsa:['badge-kadaluarsa','❌ Kadaluarsa'],nonaktif:['badge-nonaktif','⛔ Nonaktif']};
  const[c,l]=m[d.status]||['badge-nonaktif',d.status];
  sb.className='badge '+c;sb.textContent=l;
  if(d.foto_url) document.getElementById('foto-el').innerHTML=`<img src="${d.foto_url}" style="width:100%;height:100%;object-fit:cover">`;
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
}
async function save(){
  const ok=document.getElementById('ok'),err=document.getElementById('err');
  ok.style.display=err.style.display='none';
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Menyimpan...';
  const fd=new FormData();
  fd.append('email',document.getElementById('email').value);
  fd.append('no_hp',document.getElementById('no_hp').value);
  const foto=document.getElementById('foto').files[0];
  if(foto)fd.append('foto',foto);
  const res=await fetch('/api/anggota/profil',{method:'PUT',headers:{Authorization:'Bearer '+token},body:fd});
  const d=await res.json();
  if(!res.ok){err.textContent=d.error;err.style.display='block';}
  else{ok.textContent='✅ Profil berhasil diperbarui!';ok.style.display='block';}
  btn.disabled=false;btn.textContent='💾 Simpan Perubahan';
}
load();
</script>
</body>
</html>
