<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Saya - HIMTI UMB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0a1628;--navy2:#0d1f3c;--navy3:#1a2f4e;--gold:#c9a227;--gold2:#f0c040;--white:#fff;--gray:#a0aec0;--success:#28a745;--danger:#dc3545}
body{font-family:'Segoe UI',sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
.topnav{background:var(--navy2);border-bottom:2px solid var(--gold);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:12px}
.logo-circle{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--navy)}
.nav-brand{font-weight:800;font-size:1.1rem;color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-user{color:var(--gray);font-size:.85rem}
.nav-user span{color:var(--white);font-weight:600}
.btn-logout{background:transparent;border:1px solid rgba(220,53,69,.5);color:var(--danger);padding:6px 14px;border-radius:6px;font-size:.82rem;cursor:pointer;transition:.2s}
.btn-logout:hover{background:var(--danger);color:var(--white)}
.navmenu{background:var(--navy3);padding:0 24px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.05)}
.navmenu a{color:var(--gray);text-decoration:none;padding:12px 16px;font-size:.85rem;white-space:nowrap;transition:.2s;border-bottom:2px solid transparent}
.navmenu a:hover{color:var(--white);border-bottom-color:var(--gold)}
.navmenu a.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.main{max-width:800px;margin:0 auto;padding:28px 20px}
.page-title{font-size:1.5rem;font-weight:800;color:var(--gold);margin-bottom:6px}
.page-sub{color:var(--gray);font-size:.88rem;margin-bottom:24px}
.card{background:var(--navy2);border-radius:14px;padding:26px;margin-bottom:20px;border:1px solid var(--navy3)}
.card h3{color:var(--gold);font-size:1rem;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.foto-area{display:flex;align-items:center;gap:20px;margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid rgba(255,255,255,.06)}
.foto-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--gold)}
.foto-ph{width:80px;height:80px;border-radius:50%;background:var(--navy3);border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:2.2rem}
.foto-info h4{font-size:1.1rem;margin-bottom:4px}
.foto-info .npm{color:var(--gold);font-size:.82rem;margin-bottom:4px}
.foto-info .status{font-size:.78rem}
.badge-aktif{color:#5dd87a}
.badge-kadaluarsa{color:#f87184}
.badge-pending{color:#ffc107}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:550px){.row2{grid-template-columns:1fr}}
.form-group{margin-bottom:16px}
label{display:block;font-size:.82rem;color:var(--gray);margin-bottom:5px}
input{width:100%;padding:10px 14px;background:var(--navy3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--white);font-size:.9rem;outline:none;transition:.2s}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.15)}
input:read-only{opacity:.6;cursor:not-allowed}
input[type=file]{cursor:pointer;padding:8px}
.btn{padding:10px 22px;border:none;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;transition:.2s}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold2)}
.btn-gold:disabled{opacity:.6;cursor:not-allowed}
.alert{padding:11px 14px;border-radius:8px;margin-top:12px;font-size:.88rem;display:none}
.alert-success{background:rgba(40,167,69,.15);border:1px solid var(--success);color:#5dd87a}
.alert-danger{background:rgba(220,53,69,.15);border:1px solid var(--danger);color:#f87184}
.spinner{width:26px;height:26px;border:3px solid rgba(201,162,39,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<script src="/js/auth.js"></script>
<nav class="topnav">
  <div class="nav-left">
    <div class="logo-circle">H</div>
    <span class="nav-brand">HIMTI UMB</span>
  </div>
  <div class="nav-right">
    <span class="nav-user">Halo, <span id="nav-nama">-</span></span>
    <button class="btn-logout" onclick="himtiLogout()">Keluar</button>
  </div>
</nav>
<div class="navmenu">
  <a href="/anggota/dashboard.html">🏠 Beranda</a>
  <a href="/anggota/profil.html" class="active">👤 Profil</a>
  <a href="/anggota/cari-anggota.html">🔍 Cari Anggota</a>
  <a href="/anggota/bayar-iuran.html">💳 Bayar Iuran</a>
  <a href="/anggota/perpanjangan.html">🔄 Perpanjang</a>
  <a href="/anggota/kartu-anggota.html">🪪 Kartu Anggota</a>
  <a href="/anggota/presensi.html">📅 Presensi</a>
</div>
<div class="main">
  <div class="page-title">👤 Profil Saya</div>
  <p class="page-sub">Lihat dan perbarui informasi profil akun kamu</p>
  <div id="loading"><div class="spinner"></div></div>
  <div id="content" style="display:none">
    <div class="card">
      <div class="foto-area">
        <div id="foto-wrap"><div class="foto-ph">👤</div></div>
        <div class="foto-info">
          <h4 id="p-nama">-</h4>
          <div class="npm" id="p-npm">-</div>
          <div class="status" id="p-status">-</div>
        </div>
      </div>
      <h3>✏️ Edit Profil</h3>
      <div class="row2">
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="nama" readonly>
        </div>
        <div class="form-group">
          <label>NPM</label>
          <input type="text" id="npm" readonly>
        </div>
      </div>
      <div class="row2">
        <div class="form-group">
          <label>Program Studi</label>
          <input type="text" id="prodi" readonly>
        </div>
        <div class="form-group">
          <label>Angkatan</label>
          <input type="text" id="angkatan" readonly>
        </div>
      </div>
      <div class="row2">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="email aktif kamu">
        </div>
        <div class="form-group">
          <label>No. HP / WhatsApp</label>
          <input type="text" id="no_hp" placeholder="08xxxxxxxxxx">
        </div>
      </div>
      <div class="form-group">
        <label>Ganti Foto Profil</label>
        <input type="file" id="foto" accept="image/*">
      </div>
      <div class="alert alert-success" id="ok"></div>
      <div class="alert alert-danger" id="err"></div>
      <button class="btn btn-gold" id="btn-save" onclick="save()">💾 Simpan Perubahan</button>
    </div>
    <div class="card">
      <h3>📋 Info Keanggotaan</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div style="background:var(--navy3);border-radius:10px;padding:16px;text-align:center">
          <div style="font-size:.75rem;color:var(--gray);margin-bottom:6px">Bergabung</div>
          <div style="font-weight:700;color:var(--gold)" id="tgl-bergabung">-</div>
        </div>
        <div style="background:var(--navy3);border-radius:10px;padding:16px;text-align:center">
          <div style="font-size:.75rem;color:var(--gray);margin-bottom:6px">Masa Aktif Sampai</div>
          <div style="font-weight:700" id="tgl-sampai">-</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const token = localStorage.getItem('himti_token');
if (!token || localStorage.getItem('himti_role') !== 'anggota') window.location.href='/anggota/login.html';
document.getElementById('nav-nama').textContent = localStorage.getItem('himti_nama') || '-';
function logout(){ himtiLogout(); }
function fmtDate(d){if(!d)return'-';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});}
async function loadProfil(){
  try{
    const res=await fetch('/api/anggota/profil',{headers:{Authorization:'Bearer '+token}});
    const d=await res.json();
    if(!res.ok){logout();return;}
    document.getElementById('nama').value=d.nama;
    document.getElementById('npm').value=d.npm;
    document.getElementById('prodi').value=d.prodi||'-';
    document.getElementById('angkatan').value=d.angkatan||'-';
    document.getElementById('email').value=d.email||'';
    document.getElementById('no_hp').value=d.no_hp||'';
    document.getElementById('p-nama').textContent=d.nama;
    document.getElementById('p-npm').textContent='NPM: '+d.npm;
    const sc={aktif:'badge-aktif ✅ Aktif',pending:'badge-pending ⏳ Pending',kadaluarsa:'badge-kadaluarsa ❌ Kadaluarsa',nonaktif:'badge-nonaktif ⛔ Nonaktif'};
    const parts=(sc[d.status]||'').split(' ');
    const cls=parts[0]; const lbl=parts.slice(1).join(' ');
    document.getElementById('p-status').innerHTML=`<span class="${cls}">${lbl}</span>`;
    if(d.foto_url) document.getElementById('foto-wrap').innerHTML=`<img src="${d.foto_url}" class="foto-img" alt="foto">`;
    document.getElementById('tgl-bergabung').textContent=d.tahun_bergabung||'-';
    const sampaiEl=document.getElementById('tgl-sampai');
    sampaiEl.textContent=fmtDate(d.masa_aktif_sampai);
    if(d.status==='kadaluarsa')sampaiEl.style.color='var(--danger)';
    else if(d.status==='aktif')sampaiEl.style.color='var(--success)';
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
  }catch(e){alert('Gagal memuat profil');}
}
async function save(){
  const ok=document.getElementById('ok');
  const err=document.getElementById('err');
  ok.style.display=err.style.display='none';
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Menyimpan...';
  const fd=new FormData();
  fd.append('email',document.getElementById('email').value);
  fd.append('no_hp',document.getElementById('no_hp').value);
  const foto=document.getElementById('foto').files[0];
  if(foto)fd.append('foto',foto);
  try{
    const res=await fetch('/api/anggota/profil',{method:'PUT',headers:{Authorization:'Bearer '+token},body:fd});
    const d=await res.json();
    if(!res.ok){err.textContent=d.error;err.style.display='block';}
    else{ok.textContent='✅ Profil berhasil diperbarui!';ok.style.display='block';}
  }catch(e){err.textContent='Gagal menyimpan';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='💾 Simpan Perubahan';}
}
loadProfil();
</script>
</body>
</html>
