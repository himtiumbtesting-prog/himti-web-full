<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bayar Iuran - HIMTI UMB</title>
<script src="/js/auth.js"></script>
<link rel="stylesheet" href="/anggota/anggota.css">
</head>
<body>
<div class="topbar">
  <a href="/anggota/dashboard.html" class="brand"><div class="brand-logo">H</div><span class="brand-name">HIMTI UMB</span></a>
  <div class="topbar-right"><span class="topbar-user">Halo, <strong id="nav-nama">-</strong></span><button class="btn-logout" onclick="himtiLogout()">Keluar</button></div>
</div>
<div class="backbar"><a href="/anggota/dashboard.html" class="back-btn">← Kembali</a><span class="backbar-title">Bayar Iuran</span></div>
<div class="page">
  <div class="card">
    <div class="card-title">📋 Info Pembayaran</div>
    <div class="info-row"><span class="info-label">Bank</span><span class="info-value" id="p-bank">-</span></div>
    <div class="info-row"><span class="info-label">No. Rekening</span><span class="info-value" id="p-norek">-</span></div>
    <div class="info-row"><span class="info-label">Atas Nama</span><span class="info-value" id="p-atasnama">-</span></div>
    <div class="info-row"><span class="info-label">Nominal</span><span class="info-value"><span style="background:#c9a227;color:#0a1628;padding:3px 10px;border-radius:10px;font-weight:700;font-size:.82rem" id="p-nominal">-</span></span></div>
    <p style="font-size:.78rem;color:#8896a5;margin-top:12px;font-style:italic" id="p-instruksi"></p>
  </div>
  <div class="card" id="form-upload">
    <div class="card-title">📤 Upload Bukti Pembayaran</div>
    <div class="form-group"><label class="form-label">Foto Bukti Transfer *</label><input type="file" id="bukti" accept="image/*"></div>
    <div class="form-group"><label class="form-label">Catatan (opsional)</label><input type="text" id="catatan" placeholder="contoh: transfer via BRI mobile"></div>
    <div class="alert alert-success" id="ok"></div>
    <div class="alert alert-danger" id="err"></div>
    <button class="btn btn-primary btn-full" id="btn-kirim" onclick="kirim()">📤 Kirim Bukti Pembayaran</button>
  </div>
  <div class="card">
    <div class="card-title">📜 Riwayat</div>
    <div id="riwayat"><div class="spinner-wrap" style="min-height:60px"><div class="spinner"></div></div></div>
  </div>
</div>
<script>
const token=sessionStorage.getItem('himti_token');
if(!token||sessionStorage.getItem('himti_role')!=='anggota')window.location.href='/anggota/login.html';
document.getElementById('nav-nama').textContent=sessionStorage.getItem('himti_nama')||'-';
function fmtDT(d){return d?new Date(d).toLocaleString('id-ID',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'-';}
async function loadInfo(){
  const info=await fetch('/api/info-pembayaran').then(r=>r.json()).catch(()=>({}));
  document.getElementById('p-bank').textContent=info.nama_bank||'-';
  document.getElementById('p-norek').textContent=info.nomor_rekening||'-';
  document.getElementById('p-atasnama').textContent=info.atas_nama||'-';
  document.getElementById('p-nominal').textContent='Rp '+(info.nominal_iuran||50000).toLocaleString('id-ID');
  document.getElementById('p-instruksi').textContent=info.instruksi||'';
}
async function loadRiwayat(){
  const res=await fetch('/api/pembayaran/status',{headers:{Authorization:'Bearer '+token}});
  const data=await res.json();
  if(!Array.isArray(data)||!data.length){document.getElementById('riwayat').innerHTML='<div class="empty">Belum ada riwayat pembayaran</div>';return;}
  const hasPending=data.some(d=>d.status==='pending');
  if(hasPending) document.getElementById('form-upload').innerHTML='<div class="alert alert-warn" style="display:block">⏳ Pembayaran sedang diproses oleh admin. Harap tunggu konfirmasi.</div>';
  const bm={pending:['badge-pending','⏳ Menunggu'],approved:['badge-approved','✅ Disetujui'],rejected:['badge-rejected','❌ Ditolak']};
  document.getElementById('riwayat').innerHTML=data.map(d=>{
    const[c,l]=bm[d.status]||['badge-nonaktif',d.status];
    return `<div class="history-item"><div class="history-head"><span style="font-size:.85rem;font-weight:600">${d.jenis==='iuran_awal'?'Iuran Awal':'Perpanjangan'}</span><span class="badge ${c}">${l}</span></div><div class="history-date">${fmtDT(d.submitted_at)}</div>${d.catatan_admin?`<div class="history-note">Catatan: ${d.catatan_admin}</div>`:''}</div>`;
  }).join('');
}
async function kirim(){
  const ok=document.getElementById('ok'),err=document.getElementById('err');
  ok.style.display=err.style.display='none';
  const bukti=document.getElementById('bukti').files[0];
  if(!bukti){err.textContent='Pilih foto bukti pembayaran!';err.style.display='block';return;}
  const btn=document.getElementById('btn-kirim');btn.disabled=true;btn.textContent='Mengirim...';
  const fd=new FormData();fd.append('bukti',bukti);fd.append('catatan',document.getElementById('catatan').value);
  const res=await fetch('/api/pembayaran/submit',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});
  const d=await res.json();
  if(!res.ok){err.textContent=d.error;err.style.display='block';}
  else{ok.textContent='✅ '+d.message;ok.style.display='block';loadRiwayat();}
  btn.disabled=false;btn.textContent='📤 Kirim Bukti Pembayaran';
}
loadInfo();loadRiwayat();
</script>
</body>
</html>
