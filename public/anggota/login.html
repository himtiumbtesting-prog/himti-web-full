<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Anggota - HIMTI UMB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0a1628;--navy2:#0d1f3c;--navy3:#1a2f4e;--gold:#c9a227;--gold2:#f0c040;--white:#fff;--gray:#a0aec0;--danger:#dc3545}
body{font-family:'Segoe UI',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.back{position:fixed;top:20px;left:20px;color:var(--gray);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--gold)}
.card{background:var(--navy2);border-radius:16px;padding:40px;width:100%;max-width:420px;border:1px solid var(--navy3)}
.logo-area{text-align:center;margin-bottom:30px}
.logo-circle{width:64px;height:64px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;color:var(--navy);margin:0 auto 12px}
h1{font-size:1.5rem;color:var(--gold);margin-bottom:4px}
.sub{color:var(--gray);font-size:.85rem}
.form-group{margin-bottom:18px}
label{display:block;font-size:.85rem;color:var(--gray);margin-bottom:6px}
input{width:100%;padding:11px 14px;background:var(--navy3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--white);font-size:.95rem;outline:none;transition:.2s}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.15)}
.btn{width:100%;padding:12px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px}
.btn:hover{background:var(--gold2)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.alert{padding:11px 14px;border-radius:8px;margin-top:14px;font-size:.88rem;display:none;background:rgba(220,53,69,.15);border:1px solid var(--danger);color:#f87184}
.links{text-align:center;margin-top:20px;font-size:.85rem;color:var(--gray)}
.links a{color:var(--gold);text-decoration:none;margin:0 8px}
.links a:hover{text-decoration:underline}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-toggle{position:absolute;right:2px;top:2px;bottom:2px;background:transparent;border:none;
  cursor:pointer;font-size:1.1rem;padding:0 12px;color:var(--gray);opacity:.75;transition:.2s}
.pw-toggle:hover{opacity:1;color:var(--gold)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--navy2);border-radius:14px;padding:28px;max-width:400px;width:100%;border:1px solid var(--navy3)}
.modal-box h3{color:var(--gold);margin-bottom:8px;font-size:1.05rem}
.modal-box p{color:var(--gray);font-size:.83rem;margin-bottom:16px;line-height:1.5}
.modal-footer{display:flex;gap:10px;margin-top:6px}
.btn-outline-modal{flex:1;background:transparent;border:1px solid var(--navy3);color:var(--gray);padding:11px;border-radius:8px;cursor:pointer;font-size:.9rem}
.alert-success-modal{background:rgba(40,167,69,.15);border:1px solid #28a745;color:#5dd87a;padding:11px 14px;border-radius:8px;margin-top:12px;font-size:.85rem;display:none}
</style>
</head>
<body>
<script src="/js/auth.js"></script>
<a href="/index.html" class="back">← Beranda</a>
<div class="card">
  <div class="logo-area">
    <div class="logo-circle">H</div>
    <h1>HIMTI UMB</h1>
    <p class="sub">Login Anggota</p>
  </div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="username kamu" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="password kamu" onkeydown="if(event.key==='Enter')login()">
      <button type="button" class="pw-toggle" onclick="togglePw('password',this)">👁️</button>
    </div>
  </div>
  <div id="kick-msg" style="padding:11px 14px;border-radius:8px;margin-bottom:10px;font-size:.88px;display:none"></div>
  <div class="alert" id="alert-err"></div>
  <button class="btn" id="btn-login" onclick="login()">Login</button>
  <div class="links">
    <a href="/anggota/register.html">Daftar Anggota</a> •
    <a href="#" onclick="openForgotModal();return false;">Lupa Password?</a>
  </div>
</div>

<!-- MODAL LUPA PASSWORD -->
<div class="modal-overlay" id="modal-forgot">
  <div class="modal-box">
    <h3>🔑 Lupa Password</h3>
    <p>Masukkan NPM dan Email yang terdaftar pada akun kamu, lalu buat password baru.</p>
    <div class="form-group">
      <label>NPM</label>
      <input type="text" id="forgot-identifier" placeholder="NPM kamu">
    </div>
    <div class="form-group">
      <label>Email Terdaftar</label>
      <input type="email" id="forgot-email" placeholder="email yang terdaftar">
    </div>
    <div class="form-group">
      <label>Password Baru</label>
      <div class="pw-wrap">
        <input type="password" id="forgot-pw-baru" placeholder="minimal 6 karakter">
        <button type="button" class="pw-toggle" onclick="togglePw('forgot-pw-baru',this)">👁️</button>
      </div>
    </div>
    <div class="form-group">
      <label>Konfirmasi Password Baru</label>
      <div class="pw-wrap">
        <input type="password" id="forgot-pw-konfirm" placeholder="ulangi password baru">
        <button type="button" class="pw-toggle" onclick="togglePw('forgot-pw-konfirm',this)">👁️</button>
      </div>
    </div>
    <div class="alert" id="forgot-err"></div>
    <div class="alert-success-modal" id="forgot-ok"></div>
    <div class="modal-footer">
      <button class="btn" id="btn-forgot-submit" onclick="submitForgot()" style="margin-top:0">Ganti Password</button>
    </div>
    <div class="modal-footer">
      <button class="btn-outline-modal" onclick="closeForgotModal()">Tutup</button>
    </div>
  </div>
</div>
<script>
function togglePw(id, btn){
  const inp=document.getElementById(id);
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁️';}
}
if(sessionStorage.getItem('himti_token') && sessionStorage.getItem('himti_role')==='anggota')
  window.location.href='/anggota/dashboard.html';
async function login(){
  const btn=document.getElementById('btn-login');
  const err=document.getElementById('alert-err');
  err.style.display='none';
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  if(!username||!password){err.textContent='Username dan password wajib diisi!';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Masuk...';
  try{
    const res=await fetch('/api/auth/login-anggota',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(!res.ok){err.textContent=data.error;err.style.display='block';}
    else{
      sessionStorage.setItem('himti_token',data.token);
      sessionStorage.setItem('himti_role','anggota');
      sessionStorage.setItem('himti_nama',data.nama);
      window.location.href='/anggota/dashboard.html';
    }
  }catch(e){err.textContent='Gagal terhubung ke server';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Login';}
}

function openForgotModal(){
  document.getElementById('forgot-identifier').value='';
  document.getElementById('forgot-email').value='';
  document.getElementById('forgot-pw-baru').value='';
  document.getElementById('forgot-pw-konfirm').value='';
  document.getElementById('forgot-err').style.display='none';
  document.getElementById('forgot-ok').style.display='none';
  document.getElementById('btn-forgot-submit').style.display='inline-block';
  document.getElementById('modal-forgot').classList.add('show');
}
function closeForgotModal(){
  document.getElementById('modal-forgot').classList.remove('show');
}
async function submitForgot(){
  const err=document.getElementById('forgot-err');
  const ok=document.getElementById('forgot-ok');
  err.style.display=ok.style.display='none';
  const identifier=document.getElementById('forgot-identifier').value.trim();
  const email=document.getElementById('forgot-email').value.trim();
  const pw1=document.getElementById('forgot-pw-baru').value;
  const pw2=document.getElementById('forgot-pw-konfirm').value;
  if(!identifier){err.textContent='NPM wajib diisi!';err.style.display='block';return;}
  if(!email){err.textContent='Email wajib diisi!';err.style.display='block';return;}
  if(!pw1||pw1.length<6){err.textContent='Password baru minimal 6 karakter!';err.style.display='block';return;}
  if(pw1!==pw2){err.textContent='Konfirmasi password tidak cocok!';err.style.display='block';return;}
  const btn=document.getElementById('btn-forgot-submit');
  btn.disabled=true;btn.textContent='Memproses...';
  try{
    const res=await fetch('/api/auth/reset-password-langsung',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({role:'anggota',identifier,email,password_baru:pw1})
    });
    const d=await res.json();
    if(!res.ok){err.textContent=d.error;err.style.display='block';}
    else{ok.textContent='✅ '+d.message;ok.style.display='block';btn.style.display='none';}
  }catch(e){err.textContent='Gagal terhubung ke server';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Ganti Password';}
}
document.getElementById('modal-forgot').addEventListener('click',e=>{if(e.target===e.currentTarget)closeForgotModal();});
</script>
</body>
</html>
