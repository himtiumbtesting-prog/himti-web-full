<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cari Anggota - HIMTI UMB</title>
<script src="/js/auth.js"></script>
<link rel="stylesheet" href="/anggota/anggota.css">
<style>
.search-box{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.search-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.member-list{display:flex;flex-direction:column;gap:10px}
.member-item{background:#fff;border-radius:12px;padding:14px 16px;
             border:1px solid #e2e8f0;display:flex;align-items:center;gap:12px}
.member-avatar{width:44px;height:44px;border-radius:50%;background:#f1f5f9;
               border:2px solid #c9a227;display:flex;align-items:center;justify-content:center;
               font-size:1.3rem;flex-shrink:0}
.member-nama{font-weight:700;font-size:.9rem;color:#1a202c}
.member-npm{font-size:.75rem;color:#c9a227;font-family:monospace}
.member-meta{font-size:.72rem;color:#8896a5;margin-top:2px}
.result-info{font-size:.78rem;color:#8896a5;margin-bottom:10px;text-align:center}
.result-info strong{color:#1a202c}
</style>
</head>
<body>
<div class="topbar">
  <a href="/anggota/dashboard.html" class="brand">
    <img src="/assets/logo-himti.png" class="brand-logo" alt="Logo HIMTI UMB"><span class="brand-name">HIMTI UMB</span>
  </a>
  <div class="topbar-right">
    <span class="topbar-user">Halo, <strong id="nav-nama">-</strong></span>
    <button class="btn-logout" onclick="himtiLogout()">Keluar</button>
  </div>
</div>
<div class="backbar">
  <a href="/anggota/dashboard.html" class="back-btn">← Kembali</a>
  <span class="backbar-title">Cari Anggota</span>
</div>
<div class="page">
  <div class="card">
    <div class="search-box">
      <input type="text" id="q" placeholder="🔍 Cari nama anggota..." oninput="debounceSearch()">
      <div class="search-row">
        <input type="text" id="npm" placeholder="NPM" oninput="debounceSearch()">
        <select id="tahun" onchange="cari()">
          <option value="">Semua Tahun</option>
        </select>
      </div>
    </div>
    <div id="result-info" class="result-info" style="display:none"></div>
    <div id="loading-search" style="display:none;text-align:center;padding:20px"><div class="spinner" style="margin:0 auto"></div></div>
    <div id="results"></div>
  </div>
</div>
<script>
const token=sessionStorage.getItem('himti_token');
if(!token||sessionStorage.getItem('himti_role')!=='anggota')window.location.href='/anggota/login.html';
document.getElementById('nav-nama').textContent=sessionStorage.getItem('himti_nama')||'-';
const y=new Date().getFullYear();
const sel=document.getElementById('tahun');
for(let i=y;i>=2015;i--){const o=document.createElement('option');o.value=i;o.textContent=i;sel.appendChild(o);}

let timer;
function debounceSearch(){clearTimeout(timer);timer=setTimeout(cari,400);}

function fmtDate(d){return d?new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}):'-';}

function badgeHtml(s){
  const m={aktif:'badge-aktif ✅ Aktif',kadaluarsa:'badge-kadaluarsa ❌ Kadaluarsa',nonaktif:'badge-nonaktif ⛔ Nonaktif'};
  const v=m[s]||('badge-nonaktif '+s);const[c,...rest]=v.split(' ');
  return `<span class="badge ${c}">${rest.join(' ')}</span>`;
}

async function cari(){
  const q=document.getElementById('q').value.trim();
  const npm=document.getElementById('npm').value.trim();
  const tahun=document.getElementById('tahun').value;
  const params=new URLSearchParams();
  if(q)params.set('q',q);if(npm)params.set('npm',npm);if(tahun)params.set('tahun',tahun);
  document.getElementById('loading-search').style.display='block';
  document.getElementById('results').innerHTML='';
  document.getElementById('result-info').style.display='none';
  try{
    const res=await fetch('/api/anggota/cari?'+params,{headers:{Authorization:'Bearer '+token}});
    const data=await res.json();
    document.getElementById('loading-search').style.display='none';
    const ri=document.getElementById('result-info');
    ri.innerHTML=`Ditemukan <strong>${data.length}</strong> anggota`;
    ri.style.display='block';
    if(!data.length){document.getElementById('results').innerHTML='<div class="empty">😕 Tidak ada anggota yang ditemukan</div>';return;}
    document.getElementById('results').innerHTML=`<div class="member-list">${data.map(m=>`
      <div class="member-item">
        <div class="member-avatar">👤</div>
        <div style="flex:1;min-width:0">
          <div class="member-nama">${m.nama}</div>
          <div class="member-npm">${m.npm}</div>
          <div class="member-meta">${m.prodi||'-'} · Angkatan ${m.angkatan||'-'} · ${m.tahun_bergabung||'-'}</div>
        </div>
        ${badgeHtml(m.status)}
      </div>`).join('')}</div>`;
  }catch(e){document.getElementById('loading-search').style.display='none';}
}
cari();
</script>
</body>
</html>
